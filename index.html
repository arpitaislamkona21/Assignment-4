<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-200">

<!-- Main Container -->
<div class="max-w-5xl mx-auto bg-white min-h-screen p-6">

  <!-- Title -->
  <h1 class="text-xl font-bold mb-6">Job Application Tracker</h1>
<!-- Dashboard Cards -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">

      <div class="bg-gray-50 p-4 rounded shadow">
         <p class="text-sm text-gray-500">Total</p>
       <p id="totalCount" class="text-lg font-bold">8</p>
  </div>

  <div class="bg-gray-50 p-4 rounded shadow">
     <p class="text-sm text-gray-500">Interview</p>
    <p id="interviewCount" class="text-green-600 font-bold">0</p>
  </div>

  <div class="bg-gray-50 p-4 rounded shadow">
    <p class="text-sm text-gray-500">Rejected</p>
     <p id="rejectedCount" class="text-red-600 font-bold">0</p>
  </div>

</div>

<!-- Available Jobs Header -->
  <div class="flex justify-between items-center mb-3">
    <h2 class="text-sm font-semibold">Available Jobs</h2>
    <p id="tabCount" class="text-xs text-gray-500">8 jobs</p>
  </div>
