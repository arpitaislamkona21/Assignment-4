<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job Application Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-200">

<!-- Main Container -->
<div class="max-w-5xl mx-auto bg-white min-h-screen p-6">

  <!-- Title -->
  <h1 class="text-xl font-bold mb-6">Job Application Tracker</h1>
<!-- Dashboard Cards -->
<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 mb-8">

      <div class="bg-gray-50 p-4 rounded shadow">
         <p class="text-sm font-semibold text-gray-500">Total</p>
       <p id="totalCount" class="text-lg font-bold">8</p>
  </div>

  <div class="bg-gray-50 p-4 rounded shadow">
     <p class="text-sm font-semibold text-gray-500">Interview</p>
    <p id="interviewCount" class="text-green-600 font-bold">0</p>
  </div>

  <div class="bg-gray-50 p-4 rounded shadow">
    <p class="text-sm font-semibold text-gray-500">Rejected</p>
     <p id="rejectedCount" class="text-red-600 font-bold">0</p>
  </div>

</div>

<!-- Available Jobs Header -->
  <div class="flex justify-between items-center mb-3">
    <h2 class="text-sm font-semibold">Available Jobs</h2>
    <p id="tabCount" class="text-xs text-gray-500">8 jobs</p>
  </div>
<!-- Tabs -->
  <div class="flex gap-2 mb-6 text-sm">
    <button onclick="switchTab('all')" class="tab-btn bg-blue-500 text-white px-3 py-1 rounded">All</button>
    <button onclick="switchTab('interview')" class="tab-btn bg-gray-100  px-3 py-1 rounded">Interview</button>
    <button onclick="switchTab('rejected')" class="tab-btn bg-gray-100 px-3 py-1 rounded">Rejected</button>
  </div>
 <!-- Job Cards -->
  <div id="jobContainer" class="space-y-4"></div>


   <!-- Empty State -->
  <div id="emptyState" class="hidden text-center py-20">
    <div class="flex justify-center mb-4">
      <div class="bg-blue-100 p-4 rounded">
        📄
      </div>
    </div>
    <h3 class="font-semibold text-sm">No jobs available</h3>
    <p class="text-xs text-gray-500">Check back soon for new opportunities</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
